<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; }
  html, body { width: {{width}}px; height: {{height}}px; margin: 0; overflow: hidden; }
  body { --paper: {{bg_color}}; --accent: {{accent_color}}; --ink: #090909; font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; background: var(--paper); color: var(--ink); }
  .poster { position: relative; width: 100%; height: 100%; overflow: hidden; padding: 66px 78px 55px; display: flex; flex-direction: column; }
  .masthead { display: flex; justify-content: space-between; align-items: center; font-size: 22px; line-height: 1; font-weight: 800; }
  .brand { display: flex; align-items: center; gap: 11px; color: var(--accent); } .mark { width: 17px; height: 17px; background: var(--accent); transform: rotate(-7deg); }
  .page { color: #666; font: 700 20px/1 Consolas, monospace; }
  .copy { position: relative; z-index: 4; margin-top: 55px; }
  .section { font-size: 27px; line-height: 1.3; font-weight: 650; }
  .title { margin-top: 15px; max-width: 930px; max-height: 168px; overflow: hidden; font-size: 64px; line-height: 1.15; font-weight: 950; word-break: break-word; }
  .body-copy { margin-top: 22px; max-width: 900px; max-height: 178px; overflow: hidden; white-space: pre-line; font-size: 34px; line-height: 1.5; font-weight: 560; }
  .highlight { margin-top: 22px; max-width: 880px; color: var(--accent); font-size: 32px; line-height: 1.4; font-weight: 900; }
  .stage { position: absolute; left: 55px; right: 55px; top: 610px; bottom: 76px; overflow: hidden; }
  .ai-art { position: absolute; z-index: 4; inset: 0; background-image: url('{{bg_image}}'); background-size: contain; background-repeat: no-repeat; background-position: center bottom; }
  .fallback { position: absolute; inset: 0; }
  .doodle { position: absolute; border: 15px solid var(--accent); opacity: .9; }
  .doodle.one { width: 240px; height: 170px; left: 75px; top: 85px; border-radius: 48%; transform: rotate(-8deg); }
  .doodle.two { width: 150px; height: 150px; right: 90px; top: 150px; border-left: 0; border-bottom: 0; transform: rotate(14deg); }
  .figure { position: absolute; bottom: 12px; width: 245px; height: 490px; }
  .figure.one { left: 340px; } .figure.two { right: 105px; transform: scale(.88); transform-origin: bottom; } .figure.three { left: 80px; transform: scale(.78); transform-origin: bottom; }
  .head { position: absolute; left: 25px; top: 0; width: 200px; height: 215px; border: 20px solid var(--ink); border-radius: 50% 48% 47% 53%; background: var(--paper); }
  .hair { position: absolute; width: 22px; height: 72px; left: 104px; top: -54px; border-radius: 50%; background: var(--ink); transform: rotate(24deg); }
  .eye { position: absolute; top: 72px; width: 34px; height: 25px; border-radius: 50%; background: var(--ink); }
  .eye.left { left: 39px; transform: rotate(8deg); } .eye.right { right: 39px; transform: rotate(-8deg); }
  .mouth { position: absolute; right: 49px; bottom: 42px; width: 50px; height: 18px; border-bottom: 11px solid var(--ink); border-radius: 50%; transform: rotate(-8deg); }
  .torso { position: absolute; left: 71px; top: 204px; width: 108px; height: 188px; border: 18px solid var(--ink); background: var(--ink); border-radius: 18px 18px 8px 8px; }
  .shirt { position: absolute; left: 26px; top: 30px; width: 56px; height: 128px; background: var(--accent); clip-path: polygon(18% 0, 82% 0, 100% 100%, 0 100%); }
  .leg { position: absolute; top: 378px; width: 20px; height: 112px; background: var(--ink); border-radius: 14px; } .leg.left { left: 88px; } .leg.right { right: 82px; }
  .arm { position: absolute; top: 255px; width: 118px; height: 19px; background: var(--ink); border-radius: 20px; } .arm.left { left: 5px; transform: rotate(35deg); } .arm.right { right: 5px; transform: rotate(-32deg); }
  .table { display: none; position: absolute; left: 285px; bottom: 38px; width: 490px; height: 185px; border: 18px solid var(--ink); background: #fff; transform: rotate(1deg); }
  .compare-label { display: none; position: absolute; top: 115px; font: 950 78px/1 "Comic Sans MS", sans-serif; }
  .compare-label.a { left: 210px; } .compare-label.b { right: 210px; }
  .steps { display: none; position: absolute; right: 70px; top: 95px; width: 310px; color: var(--accent); font-size: 35px; line-height: 1.85; font-weight: 900; }
  .scene.dialogue .figure.one { left: 110px; transform: scale(.86); transform-origin: bottom; } .scene.dialogue .figure.two { display: block; right: 105px; } .scene.dialogue .table { display: block; }
  .scene.compare .figure.one { left: 115px; transform: scale(.84); transform-origin: bottom; } .scene.compare .figure.two { display: block; right: 105px; } .scene.compare .compare-label { display: block; }
  .scene.group .figure.one { left: 350px; transform: scale(.82); transform-origin: bottom; } .scene.group .figure.two, .scene.group .figure.three { display: block; }
  .scene.explain .figure.one { left: 160px; } .scene.explain .steps { display: block; }
  .scene.idea .figure.one { left: 420px; } .scene:not(.dialogue):not(.compare):not(.group) .figure.two, .scene:not(.group) .figure.three { display: none; }
  .footer { position: relative; z-index: 5; margin-top: auto; display: flex; justify-content: space-between; align-items: center; font-size: 21px; line-height: 1; font-weight: 750; }
</style>
</head>
<body>
  <main class="poster">
    <header class="masthead"><span class="brand"><span class="mark"></span>{{brand_name}} · {{series_name}}</span><span class="page">{{page_label}}</span></header>
    <section class="copy">
      <div class="section">{{section_label}}</div><div class="title" id="title">{{title}}</div>
      <div class="body-copy" id="body">{{body}}</div><div class="highlight optional" id="highlight">{{highlight}}</div>
    </section>
    <section class="stage scene {{illustration_variant}}">
      <div class="fallback"><div class="doodle one"></div><div class="doodle two"></div><div class="compare-label a">A</div><div class="compare-label b">B</div><div class="steps">✓ 看清问题<br>✓ 找到差别<br>✓ 形成判断</div><div class="table"></div>
        <div class="figure three"><div class="head"><div class="hair"></div><div class="eye left"></div><div class="eye right"></div><div class="mouth"></div></div><div class="torso"><div class="shirt"></div></div><div class="arm left"></div><div class="arm right"></div><div class="leg left"></div><div class="leg right"></div></div>
        <div class="figure one"><div class="head"><div class="hair"></div><div class="eye left"></div><div class="eye right"></div><div class="mouth"></div></div><div class="torso"><div class="shirt"></div></div><div class="arm left"></div><div class="arm right"></div><div class="leg left"></div><div class="leg right"></div></div>
        <div class="figure two"><div class="head"><div class="hair"></div><div class="eye left"></div><div class="eye right"></div><div class="mouth"></div></div><div class="torso"><div class="shirt"></div></div><div class="arm left"></div><div class="arm right"></div><div class="leg left"></div><div class="leg right"></div></div>
      </div><div class="ai-art"></div>
    </section>
    <footer class="footer"><span>{{footer}}</span><span>{{page_label}}</span></footer>
  </main>
<script>
  document.querySelectorAll('.optional').forEach((el) => { if (!el.textContent.trim()) el.remove(); });
  function fit(id, maxHeight, start, min) { const el = document.getElementById(id); let size = start; while (el && el.scrollHeight > maxHeight && size > min) { size -= 2; el.style.fontSize = size + 'px'; } }
  fit('title', 168, 64, 44); fit('body', 178, 34, 25); fit('highlight', 92, 32, 25);
</script>
</body>
</html>
