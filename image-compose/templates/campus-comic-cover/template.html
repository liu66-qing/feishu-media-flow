<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; }
  html, body { width: {{width}}px; height: {{height}}px; margin: 0; overflow: hidden; }
  body {
    --paper: {{bg_color}}; --accent: {{accent_color}}; --ink: #090909; --soft-blue: #acd0f6;
    font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif;
    background: var(--paper); color: var(--ink);
  }
  .poster { position: relative; width: 100%; height: 100%; overflow: hidden; padding: 70px 78px 58px; display: flex; flex-direction: column; }
  .masthead { display: flex; justify-content: space-between; align-items: center; font-size: 23px; line-height: 1; font-weight: 800; }
  .brand { display: flex; align-items: center; gap: 12px; }
  .mark { width: 18px; height: 18px; background: var(--accent); transform: rotate(-7deg); }
  .page { color: #666; font: 700 21px/1 Consolas, monospace; }
  .copy { position: relative; z-index: 4; margin-top: 68px; max-width: 930px; }
  .kicker { color: var(--accent); font-size: 31px; line-height: 1.3; font-weight: 850; }
  .title { margin-top: 22px; max-height: 300px; overflow: hidden; white-space: pre-line; word-break: break-word; font-size: 86px; line-height: 1.12; font-weight: 950; }
  .subtitle { margin-top: 22px; max-width: 870px; max-height: 92px; overflow: hidden; font-size: 31px; line-height: 1.45; font-weight: 650; }
  .scribble { margin-top: 26px; color: var(--accent); font-size: 35px; line-height: 1; font-weight: 950; letter-spacing: 0; transform: rotate(-2deg); }
  .stage { position: absolute; z-index: 1; left: 42px; right: 42px; top: 555px; bottom: 84px; overflow: hidden; }
  .ai-art { position: absolute; z-index: 3; inset: 0; background-image: url('{{bg_image}}'); background-size: contain; background-repeat: no-repeat; background-position: center bottom; }
  .halo { position: absolute; width: 520px; height: 520px; left: 280px; bottom: 50px; border: 18px solid var(--soft-blue); border-radius: 50%; transform: rotate(-4deg); }
  .character { position: absolute; left: 380px; bottom: 12px; width: 330px; height: 560px; }
  .head { position: absolute; left: 30px; top: 0; width: 275px; height: 285px; border: 24px solid var(--ink); border-radius: 48% 52% 46% 54%; background: var(--paper); transform: rotate(2deg); }
  .hair { position: absolute; width: 28px; height: 92px; left: 145px; top: -66px; border-radius: 50%; background: var(--ink); transform: rotate(25deg); }
  .eye { position: absolute; top: 92px; width: 42px; height: 31px; border-radius: 50% 50% 42% 42%; background: var(--ink); }
  .eye.left { left: 56px; transform: rotate(8deg); } .eye.right { right: 54px; transform: rotate(-8deg); }
  .mouth { position: absolute; right: 65px; bottom: 54px; width: 64px; height: 22px; border-bottom: 13px solid var(--ink); border-radius: 50%; transform: rotate(-9deg); }
  .body { position: absolute; left: 94px; top: 270px; width: 145px; height: 220px; border: 22px solid var(--ink); border-radius: 22px 22px 8px 8px; background: var(--ink); }
  .shirt { position: absolute; left: 31px; top: 38px; width: 82px; height: 150px; background: var(--accent); clip-path: polygon(18% 0, 82% 0, 100% 100%, 0 100%); }
  .arm { position: absolute; top: 318px; width: 170px; height: 26px; border-radius: 20px; background: var(--ink); }
  .arm.left { left: -38px; transform: rotate(28deg); } .arm.right { right: -36px; transform: rotate(-24deg); }
  .map { position: absolute; z-index: 2; left: 80px; bottom: -42px; width: 920px; height: 260px; background: #b6cdf0; border: 20px solid var(--ink); clip-path: polygon(0 8%, 23% 24%, 43% 9%, 65% 28%, 100% 6%, 96% 100%, 4% 100%); transform: rotate(1deg); }
  .footer { position: relative; z-index: 5; margin-top: auto; display: flex; justify-content: space-between; font-size: 22px; line-height: 1; font-weight: 750; }
</style>
</head>
<body>
  <main class="poster">
    <header class="masthead"><span class="brand"><span class="mark"></span>{{brand_name}} · {{series_name}}</span><span class="page">{{page_label}}</span></header>
    <section class="copy">
      <div class="kicker">{{section_label}}</div>
      <div class="title" id="title">{{title}}</div>
      <div class="subtitle optional" id="subtitle">{{subtitle}}</div>
      <div class="scribble">THINK · ASK · FIND OUT</div>
    </section>
    <section class="stage">
      <div class="halo"></div>
      <div class="character"><div class="head"><div class="hair"></div><div class="eye left"></div><div class="eye right"></div><div class="mouth"></div></div><div class="body"><div class="shirt"></div></div><div class="arm left"></div><div class="arm right"></div></div>
      <div class="map"></div><div class="ai-art"></div>
    </section>
    <footer class="footer"><span>{{footer}}</span><span>向下翻阅 ↓</span></footer>
  </main>
<script>
  document.querySelectorAll('.optional').forEach((el) => { if (!el.textContent.trim()) el.remove(); });
  function fit(id, maxHeight, start, min) { const el = document.getElementById(id); let size = start; while (el && el.scrollHeight > maxHeight && size > min) { size -= 2; el.style.fontSize = size + 'px'; } }
  fit('title', 300, 86, 54); fit('subtitle', 92, 31, 24);
</script>
</body>
</html>
