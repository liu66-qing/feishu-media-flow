<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; }
  html, body { width: {{width}}px; height: {{height}}px; margin: 0; overflow: hidden; }
  body {
    --paper: {{bg_color}};
    --accent: {{accent_color}};
    --ink: #151513;
    font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif;
    background: var(--accent);
    color: #fffaf0;
  }
  .poster { position: relative; width: 100%; height: 100%; overflow: hidden; isolation: isolate; }
  .art {
    position: absolute; inset: 0;
    background-image: url('{{bg_image}}');
    background-size: cover; background-position: center;
    opacity: .38;
    filter: saturate(.82) contrast(1.08);
  }
  .shade { position: absolute; inset: 0; background: rgba(118, 28, 16, .46); }
  .shape-a { position: absolute; right: -70px; top: 44%; width: 430px; height: 410px; background: rgba(255,250,240,.08); transform: rotate(4deg); }
  .shape-b { position: absolute; right: 140px; top: 58%; width: 190px; height: 270px; border: 56px solid rgba(255,250,240,.08); }
  .frame { position: absolute; inset: 0; padding: 78px 88px 72px; display: flex; flex-direction: column; z-index: 2; }
  .masthead { display: flex; align-items: center; gap: 18px; font: 800 27px/1.2 Consolas, "Microsoft YaHei", sans-serif; }
  .mark { width: 22px; height: 22px; background: #fffaf0; }
  .series { opacity: .84; }
  .hero { margin-top: clamp(190px, 23vh, 410px); max-width: 850px; }
  .kicker { font-size: 30px; line-height: 1.35; font-weight: 800; margin-bottom: 38px; opacity: .88; }
  .title { font-size: 88px; line-height: 1.13; font-weight: 950; max-height: 430px; overflow: hidden; word-break: break-word; white-space: pre-line; }
  .subtitle { margin-top: 38px; max-width: 760px; font-size: 34px; line-height: 1.45; font-weight: 650; opacity: .9; white-space: pre-line; }
  .meta { margin-top: 44px; display: flex; align-items: center; gap: 18px; font: 700 28px/1 Consolas, monospace; }
  .rule { width: 118px; height: 5px; background: #fffaf0; }
  .footer { margin-top: auto; display: flex; justify-content: space-between; align-items: end; font-size: 25px; font-weight: 750; }
  .swipe { font-family: Consolas, monospace; }
  .page-number { position: absolute; right: -20px; bottom: -98px; z-index: 1; font: 950 520px/.78 Arial, sans-serif; color: rgba(255,250,240,.08); }
</style>
</head>
<body>
  <main class="poster">
    <div class="art"></div><div class="shade"></div><div class="shape-a"></div><div class="shape-b"></div>
    <div class="page-number">{{page_number}}</div>
    <div class="frame">
      <header class="masthead"><span class="mark"></span><span>{{brand_name}}</span><span class="series">· {{series_name}}</span></header>
      <section class="hero">
        <div class="kicker">{{section_label}}</div>
        <div class="title" id="title">{{title}}</div>
        <div class="subtitle optional">{{subtitle}}</div>
        <div class="meta"><span class="rule"></span><span>{{page_label}}</span></div>
      </section>
      <footer class="footer"><span class="swipe">滑动 &gt;&gt;&gt;</span><span>{{footer}}</span></footer>
    </div>
  </main>
<script>
  document.querySelectorAll('.optional').forEach((el) => { if (!el.textContent.trim()) el.remove(); });
  const title = document.getElementById('title');
  let size = 88;
  while (title.scrollHeight > 430 && size > 54) { size -= 2; title.style.fontSize = size + 'px'; }
</script>
</body>
</html>
