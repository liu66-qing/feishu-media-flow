<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: {{width}}px;
    height: {{height}}px;
    overflow: hidden;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  }

  .container {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, {{bg_color}} 0%, {{bg_color}}dd 50%, {{bg_color}}aa 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 70px;
    position: relative;
  }

  .deco-top-left {
    position: absolute;
    top: 50px;
    left: 50px;
    font-size: 64px;
    opacity: 0.9;
    transform: rotate(-10deg);
  }

  .deco-top-right {
    position: absolute;
    top: 60px;
    right: 55px;
    font-size: 48px;
    opacity: 0.7;
    transform: rotate(8deg);
  }

  .deco-bottom {
    position: absolute;
    bottom: 55px;
    right: 60px;
    font-size: 56px;
    opacity: 0.8;
    transform: rotate(5deg);
  }

  .deco-bottom-left {
    position: absolute;
    bottom: 70px;
    left: 55px;
    font-size: 40px;
    opacity: 0.6;
    transform: rotate(-5deg);
  }

  /* 主标题区域 - 大字报风格 */
  .title-block {
    background: {{accent_color}};
    border-radius: 20px;
    padding: 40px 50px;
    max-width: 880px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    transform: rotate(-1deg);
  }

  .title {
    color: {{bg_color}};
    font-size: 68px;
    font-weight: 900;
    text-align: center;
    line-height: 1.35;
    letter-spacing: 3px;
  }

  /* 副标题标签条 */
  .subtitle-bar {
    margin-top: 40px;
    background: rgba(255,255,255,0.25);
    border-radius: 30px;
    padding: 14px 36px;
    backdrop-filter: blur(4px);
    border: 2px solid rgba(255,255,255,0.3);
  }

  .subtitle {
    color: {{accent_color}};
    font-size: 32px;
    font-weight: 600;
    text-align: center;
    letter-spacing: 1px;
  }

  /* 散落的小装饰圆点 */
  .dots {
    position: absolute;
    top: 180px;
    left: 40px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .dots span {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: {{accent_color}};
    opacity: 0.3;
  }

  .dots-right {
    position: absolute;
    bottom: 200px;
    right: 45px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .dots-right span {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: {{accent_color}};
    opacity: 0.25;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="deco-top-left">✨</div>
    <div class="deco-top-right">💡</div>
    <div class="deco-bottom">🔥</div>
    <div class="deco-bottom-left">⭐</div>

    <div class="dots"><span></span><span></span><span></span></div>
    <div class="dots-right"><span></span><span></span><span></span><span></span></div>

    <div class="title-block">
      <div class="title" id="title">{{title}}</div>
    </div>

    <div class="subtitle-bar" id="subtitle-bar">
      <div class="subtitle">{{subtitle}}</div>
    </div>
  </div>

  <script>
    (function() {
      var title = document.getElementById('title');
      var fontSize = 68;
      var maxW = 780, maxH = 400;
      while ((title.scrollWidth > maxW || title.scrollHeight > maxH) && fontSize > 36) {
        fontSize -= 2;
        title.style.fontSize = fontSize + 'px';
      }
      var sub = document.getElementById('subtitle-bar');
      if (!sub.textContent.trim()) sub.style.display = 'none';
    })();
  </script>
</body>
</html>
