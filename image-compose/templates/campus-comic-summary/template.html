<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; }
  html, body { width: {{width}}px; height: {{height}}px; margin: 0; overflow: hidden; }
  body { --paper: {{bg_color}}; --accent: {{accent_color}}; --ink: #090909; font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; background: var(--paper); color: var(--ink); }
  .poster { position: relative; width: 100%; height: 100%; overflow: hidden; padding: 66px 78px 56px; display: flex; flex-direction: column; }
  .masthead { display: flex; justify-content: space-between; color: var(--accent); font-size: 22px; line-height: 1; font-weight: 850; }
  .stage { position: relative; height: 570px; margin-top: 45px; }
  .ai-art { position: absolute; z-index: 3; inset: 0; background-image: url('{{bg_image}}'); background-size: contain; background-repeat: no-repeat; background-position: center; }
  .ring { position: absolute; left: 285px; top: 30px; width: 410px; height: 410px; border: 17px solid #a8cdf6; border-radius: 50%; transform: rotate(-4deg); }
  .head { position: absolute; z-index: 2; left: 363px; top: 70px; width: 255px; height: 270px; border: 22px solid var(--ink); border-radius: 49% 51% 47% 53%; background: var(--paper); }
  .hair { position: absolute; width: 24px; height: 82px; left: 122px; top: -60px; border-radius: 50%; background: var(--ink); transform: rotate(24deg); }
  .eye { position: absolute; top: 90px; width: 38px; height: 28px; border-radius: 50%; background: var(--ink); } .eye.left { left: 48px; } .eye.right { right: 48px; }
  .mouth { position: absolute; right: 56px; bottom: 49px; width: 58px; height: 18px; border-bottom: 12px solid var(--ink); border-radius: 50%; transform: rotate(-8deg); }
  .torso { position: absolute; left: 445px; top: 327px; width: 100px; height: 150px; background: var(--ink); border-radius: 18px; }
  .shirt { position: absolute; inset: 25px 24px 18px; background: var(--accent); clip-path: polygon(15% 0, 85% 0, 100% 100%, 0 100%); }
  .copy { position: relative; z-index: 4; text-align: center; margin: 0 auto; max-width: 920px; }
  .section { color: var(--accent); font-size: 27px; line-height: 1.3; font-weight: 850; }
  .title { margin-top: 13px; max-height: 150px; overflow: hidden; font-size: 61px; line-height: 1.16; font-weight: 950; }
  .body-copy { margin-top: 25px; max-height: 230px; overflow: hidden; white-space: pre-line; font-size: 35px; line-height: 1.55; font-weight: 800; }
  .closing { margin-top: 22px; color: var(--accent); font-size: 29px; line-height: 1.4; font-weight: 900; }
  .footer { margin-top: auto; display: flex; justify-content: space-between; font-size: 21px; line-height: 1; font-weight: 750; }
</style>
</head>
<body>
  <main class="poster">
    <header class="masthead"><span>{{brand_name}} · {{series_name}}</span><span>{{page_label}}</span></header>
    <section class="stage"><div class="ring"></div><div class="head"><div class="hair"></div><div class="eye left"></div><div class="eye right"></div><div class="mouth"></div></div><div class="torso"><div class="shirt"></div></div><div class="ai-art"></div></section>
    <section class="copy"><div class="section">{{section_label}}</div><div class="title" id="title">{{title}}</div><div class="body-copy" id="body">{{body}}</div><div class="closing optional">{{highlight}}</div></section>
    <footer class="footer"><span>{{footer}}</span><span>END</span></footer>
  </main>
<script>
  document.querySelectorAll('.optional').forEach((el) => { if (!el.textContent.trim()) el.remove(); });
  function fit(id, maxHeight, start, min) { const el = document.getElementById(id); let size = start; while (el && el.scrollHeight > maxHeight && size > min) { size -= 2; el.style.fontSize = size + 'px'; } }
  fit('title', 150, 61, 43); fit('body', 230, 35, 26);
</script>
</body>
</html>
