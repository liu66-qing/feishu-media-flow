<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: {{width}}px;
    height: {{height}}px;
    overflow: hidden;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  }

  .container {
    width: 100%;
    height: 100%;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .bg {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background-color: {{bg_color}};
    background-image: url('{{bg_image}}');
    background-size: cover;
    background-position: center;
  }

  /* 顶部半透明遮罩，确保文字可读但保留背景图可见 */
  .overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 55%;
    background: linear-gradient(
      to bottom,
      rgba(255,255,255,0.6) 0%,
      rgba(255,255,255,0.3) 50%,
      rgba(255,255,255,0) 100%
    );
  }

  .content {
    position: relative;
    z-index: 1;
    padding: 100px 70px 0;
    text-align: center;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* 顶部小标签 */
  .tag {
    display: inline-block;
    background: {{accent_color}};
    color: #FFFFFF;
    font-size: 22px;
    font-weight: 700;
    padding: 8px 24px;
    border-radius: 20px;
    margin-bottom: 36px;
    letter-spacing: 1px;
    backdrop-filter: blur(8px);
  }

  .title {
    color: #1a1a1a;
    font-size: 68px;
    font-weight: 900;
    text-align: center;
    line-height: 1.4;
    letter-spacing: 2px;
    max-width: 920px;
    word-break: break-all;
    overflow-wrap: break-word;
    text-shadow: 0 1px 12px rgba(255,255,255,0.8), 0 0 30px rgba(255,255,255,0.4);
  }

  .divider {
    width: 50px;
    height: 3px;
    background-color: {{accent_color}};
    opacity: 0.5;
    margin: 32px 0;
    border-radius: 2px;
  }

  .subtitle {
    color: #333;
    font-size: 32px;
    font-weight: 400;
    text-align: center;
    line-height: 1.5;
    max-width: 800px;
    text-shadow: 0 1px 10px rgba(255,255,255,0.6), 0 0 20px rgba(255,255,255,0.3);
  }
</style>
</head>
<body>
  <div class="container">
    <div class="bg"></div>
    <div class="overlay"></div>
    <div class="content">
      <div class="tag" id="tag">干货分享</div>
      <div class="title" id="title">{{title}}</div>
      <div class="divider"></div>
      <div class="subtitle" id="subtitle">{{subtitle}}</div>
    </div>
  </div>
  
  <script>
    (function() {
      var title = document.getElementById('title');
      var fontSize = 68;
      while ((title.scrollWidth > 880 || title.scrollHeight > 400) && fontSize > 36) {
        fontSize -= 2;
        title.style.fontSize = fontSize + 'px';
      }
      var tag = document.getElementById('tag');
      var sub = document.getElementById('subtitle');
      if (!sub.textContent.trim()) sub.style.display = 'none';
    })();
  </script>
</body>
</html>
